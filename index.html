<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wheel of Names</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 380px;
      background: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
    }

    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #fafafa;
    }

    .tab.active {
      background: white;
      border-bottom: 3px solid #2563eb;
      color: #2563eb;
    }

    .panel {
      flex: 1;
      padding: 20px;
      display: none;
      overflow: auto;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      resize: none;
      border-radius: 14px;
      border: 1px solid #ccc;
      padding: 14px;
      font-size: 16px;
      outline: none;
      line-height: 1.5;
    }

    button {
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .wheel-container {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      background: white;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .pointer {
      position: absolute;
      top: 10px;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 30px solid #111;
      z-index: 10;
    }

    .winner {
      position: absolute;
      bottom: 30px;
      background: white;
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .results-list {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      min-height: 200px;
      white-space: pre-line;
      line-height: 1.8;
      font-size: 16px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-content {
      width: 320px;
      background: white;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .button-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-top: 10px;
    }

    .button-row button {
      flex: 1;
      margin-top: 0;
    }

    #rigInput {
      flex: 1;               /* 👈 makes textarea grow */
      width: 100%;
      resize: none;
      border-radius: 14px;
      border: 1px solid #ccc;
      padding: 14px;
      font-size: 16px;
      line-height: 1.5;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .modal-content button {
      margin-top: 12px;
    }

    canvas {
      cursor: pointer;
      touch-action: manipulation;
    } 

    @media (max-width: 900px) {

      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40vh;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      .wheel-container {
        height: 60vh;
      }

      canvas {
        width: 90vw !important;
        height: auto !important;
        max-width: 420px;
        max-height: 420px;
      }

      .pointer {
        top: 10px;
      }

      .winner {
        bottom: 10px;
        font-size: 20px;
        padding: 10px 16px;
      }

      .tab {
        padding: 12px;
        font-size: 14px;
      }

      textarea {
        font-size: 14px;
      }

      button {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="modal" id="rigModal">
    <div class="modal-content">
      <h2>Rigged Spin Order</h2>

      <textarea id="rigInput" rows="8"
placeholder="Example:
Alice
Bob
*
Charlie

* = random remaining name not already selected"></textarea>

      <div class="hint">
        Enter the winner order.<br><br>
        Wildcards (*) automatically choose a random name
        that has NOT already appeared in Results.
      </div>

      <button onclick="saveRig()">Start</button>
    </div>
  </div>

  <div class="sidebar">

    <div class="tabs">
      <div class="tab active" onclick="switchTab('names')">Names</div>
      <div class="tab" onclick="switchTab('results')">Results</div>
    </div>

    <div class="panel active" id="namesPanel">
<textarea id="names">
Alice
Bob
Charlie
David
Emma
</textarea>
      <button onclick="spin()">Spin</button>
    </div>

    <div class="panel" id="resultsPanel">
      <div class="results-list" id="resultsList"></div>

      <button onclick="clearResults()">
        Clear Results
      </button>
    </div>

  </div>

  <div class="wheel-container">
    <div class="pointer"></div>

    <canvas id="wheel" width="700" height="700"></canvas>
  </div>

  <div class="modal" id="winModal" style="display:none;">
    <div class="modal-content">

      <h2>Winner 🎉</h2>

      <div id="winName" style="font-size:32px;font-weight:bold;margin:20px 0;"></div>

      <div class="button-row">
        <button onclick="cancelWin()" style="background:#6b7280;">
          Cancel
        </button>

        <button onclick="removeWinner()" style="background:#ef4444;">
          Remove
        </button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");

    let rigMode = false;

    canvas.addEventListener("click", () => {
      if (spinning) return;
      spin();
    });

    let rotation = 0;
    let spinning = false;
    let currentWinner = null;

    let riggedOrder = [];
    let remainingRigged = [];

    let results = [];

    const colors = [
      "#ef4444",
      "#f97316",
      "#eab308",
      "#22c55e",
      "#06b6d4",
      "#3b82f6",
      "#8b5cf6",
      "#ec4899",
      "#14b8a6",
      "#84cc16"
    ];

    function switchTab(tab) {
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("active");
      });

      document.querySelectorAll(".panel").forEach(p => {
        p.classList.remove("active");
      });

      if (tab === "names") {
        document.querySelectorAll(".tab")[0]
          .classList.add("active");

        document.getElementById("namesPanel")
          .classList.add("active");
      } else {
        document.querySelectorAll(".tab")[1]
          .classList.add("active");

        document.getElementById("resultsPanel")
          .classList.add("active");
      }
    }

    function getNames() {
      return document
        .getElementById("names")
        .value
        .split("\n")
        .map(n => n.trim())
        .filter(Boolean);
    }

    function saveRig() {
      const raw = document
        .getElementById("rigInput")
        .value
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      if (raw.length === 0) {
        riggedOrder = null;
        remainingRigged = null;
        rigMode = false;
      } else {
        riggedOrder = raw;
        remainingRigged = [...raw];
        rigMode = true;
      }

      document.getElementById("rigModal").style.display = "none";
    }

    function updateResults() {
      document.getElementById("resultsList").innerText =
        results.map((r, i) => `${i + 1}. ${r}`).join("\n");
    }

    function clearResults() {
      results = [];
      updateResults();
    }

    function getWildcardWinner(names) {

      let pool = names;

      // ✅ ONLY enforce "no repeats" if rig mode is ON
      if (rigMode) {
        pool = names.filter(n => !results.includes(n));
      }

      // if rig mode is ON but everything used
      if (rigMode && pool.length === 0) {
        pool = names;
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function getRiggedWinner(names) {

      if (!rigMode || !remainingRigged || remainingRigged.length === 0) {
        return getWildcardWinner(names);
      }

      const next = remainingRigged.shift();

      if (next === "*") {
        return getWildcardWinner(names);
      }

      const found = names.find(
        n => n.toLowerCase() === next.toLowerCase()
      );

      if (found && !results.includes(found)) {
        return found;
      }

      return getWildcardWinner(names);
    }

    function drawWheel() {

      const names = getNames();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = 320;

      const slice = (Math.PI * 2) / names.length;

      names.forEach((name, i) => {

        const start = rotation + (i * slice);
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();

        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.save();

        ctx.translate(cx, cy);
        ctx.rotate(start + slice / 2);

        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";

        ctx.fillText(name, radius - 25, 10);

        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, 60, 0, Math.PI * 2);
      ctx.fillStyle = "#111";
      ctx.fill();
    }

    function spin() {

      if (spinning) return;

      const names = getNames();

      if (!names.length) return;

      spinning = true;

      const winner = getRiggedWinner(names);

      const slice = (Math.PI * 2) / names.length;

      const index = names.indexOf(winner);

      // center of the segment
      const baseAngle = index * slice + slice / 2;

      const jitterRange = slice * 0.5;

      const jitter = (Math.random() - 0.5) * jitterRange;

      const targetAngle = (Math.PI * 1.5) - (baseAngle + jitter);

      const spins = 10;

      const finalRotation =  Math.PI * 2 * 8 + targetAngle;

      const duration = 8500;

      const start = performance.now();

      const initial = rotation;

      function animate(now) {

        const elapsed = now - start;

        const t = Math.min(elapsed / duration, 1);

        const ease = 1 - Math.pow(1 - t, 6);
        rotation = initial + (finalRotation - initial) * ease;

        drawWheel();

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {

          spinning = false;

          rotation %= (Math.PI * 2);

          currentWinner = winner;

          // show modal
          document.getElementById("winName").innerText = winner;
          document.getElementById("winModal").style.display = "flex";

          results.push(winner);

          updateResults();
        }
      }

      requestAnimationFrame(animate);
    }

    function cancelWin() {
      document.getElementById("winModal").style.display = "none";
      currentWinner = null;
    }

    function removeWinner() {

      if (!currentWinner) return;

      const textarea = document.getElementById("names");

      let names = textarea.value
        .split("\n")
        .map(n => n.trim())
        .filter(Boolean);

      names = names.filter(n => n !== currentWinner);

      textarea.value = names.join("\n");

      document.getElementById("winModal").style.display = "none";

      currentWinner = null;

      drawWheel();
    }

    document
      .getElementById("names")
      .addEventListener("input", drawWheel);

    drawWheel();
  </script>

</body>
</html>
